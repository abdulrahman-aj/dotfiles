# Window
[window]
decorations = "None"
opacity = 1.0
padding = { x = 12, y = 12 }

# Typography
[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
size = 12.0

# Cursor
[cursor]
style = { shape = "Block", blinking = "Off" }

# Scrollback
[scrolling]
history = 3023

# Mouse
[mouse]
hide_when_typing = true

# Selection
[selection]
save_to_clipboard = false

# Colors — VS Code "Dark Modern" (matches Zed), ported from Ghostty's theme
[colors.primary]
background = "#1f1f1f"
foreground = "#cccccc"

[colors.cursor]
cursor = "#ffffff"
text = "#000000"

[colors.selection]
background = "#3a3d41"
text = "#e0e0e0"

[colors.normal]
black = "#272727"
red = "#f74949"
green = "#2ea043"
yellow = "#9e6a03"
blue = "#0078d4"
magenta = "#d01273"
cyan = "#1db4d6"
white = "#cccccc"

[colors.bright]
black = "#5d5d5d"
red = "#dc5452"
green = "#23d18b"
yellow = "#f5f543"
blue = "#3b8eea"
magenta = "#d670d6"
cyan = "#29b8db"
white = "#e5e5e5"

# Key bindings (Alacritty has no tabs/splits — niri tiles windows)
[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "Plus"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"
